name: arXiv-daily-ai-enhanced

on:
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pre-check today's AI enhanced file
        id: precheck
        env:
          LANGUAGE: ${{ vars.LANGUAGE }}
        run: |
          today=$(date -u "+%Y-%m-%d")
          ai_file="data/${today}_AI_enhanced_${LANGUAGE}.jsonl"

          echo "today=$today" >> "$GITHUB_OUTPUT"
          echo "ai_file=$ai_file" >> "$GITHUB_OUTPUT"

          if [ -f "$ai_file" ]; then
            echo "skip_today=true" >> "$GITHUB_OUTPUT"
            echo "✅ Found today's AI enhanced file: $ai_file"
            echo "⏭️ Skip all subsequent processing."
          else
            echo "skip_today=false" >> "$GITHUB_OUTPUT"
            echo "📝 Today's AI enhanced file not found: $ai_file"
            echo "▶️ Continue workflow."
          fi

      - name: Install dependencies
        if: steps.precheck.outputs.skip_today != 'true'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv sync

      - name: Crawl arXiv papers
        if: steps.precheck.outputs.skip_today != 'true'
        id: crawl_step
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LANGUAGE: ${{ vars.LANGUAGE }}
          CATEGORIES: ${{ vars.CATEGORIES }}
          INTEREST: ${{ vars.INTEREST }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
        run: |
          source .venv/bin/activate
          today="${{ steps.precheck.outputs.today }}"
          echo "开始爬取 $today 的 arXiv 论文..."

          if [ -f "data/${today}.jsonl" ]; then
              echo "🗑️ 发现今日原始文件已存在，删除后重新生成..."
              rm "data/${today}.jsonl"
          else
              echo "📝 今日原始文件不存在，准备新建..."
          fi

          cd daily_arxiv
          scrapy crawl arxiv -o ../data/${today}.jsonl

          if [ ! -f "../data/${today}.jsonl" ]; then
              echo "爬取失败，未生成数据文件"
              exit 1
          fi

          echo "crawl_date=$today" >> "$GITHUB_OUTPUT"
          echo "爬取完成"

      - name: Check for duplicates
        if: steps.precheck.outputs.skip_today != 'true'
        id: dedup_check
        run: |
          source .venv/bin/activate
          echo "执行去重检查..."

          cd daily_arxiv
          set +e
          python daily_arxiv/check_stats.py
          dedup_exit_code=$?
          set -e

          echo "去重检查退出码: $dedup_exit_code"
          echo "dedup_exit_code=$dedup_exit_code" >> "$GITHUB_OUTPUT"

          case $dedup_exit_code in
              0)
                  echo "has_new_content=true" >> "$GITHUB_OUTPUT"
                  ;;
              1)
                  echo "has_new_content=false" >> "$GITHUB_OUTPUT"
                  echo "skip_reason=no_new_content" >> "$GITHUB_OUTPUT"
                  ;;
              2)
                  echo "has_new_content=false" >> "$GITHUB_OUTPUT"
                  echo "skip_reason=processing_error" >> "$GITHUB_OUTPUT"
                  exit 1
                  ;;
              *)
                  echo "❌ 未知退出码，停止工作流"
                  echo "has_new_content=false" >> "$GITHUB_OUTPUT"
                  echo "skip_reason=unknown_error" >> "$GITHUB_OUTPUT"
                  exit 1
                  ;;
          esac

      - name: AI Enhancement Processing
        if: steps.precheck.outputs.skip_today != 'true' && steps.dedup_check.outputs.has_new_content == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LANGUAGE: ${{ vars.LANGUAGE }}
          INTEREST: ${{ vars.INTEREST }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
        run: |
          source .venv/bin/activate
          today="${{ steps.precheck.outputs.today }}"
          echo "开始 AI 增强处理..."

          cd ai
          python enhance.py --data ../data/${today}.jsonl

          echo "AI 增强处理完成"

      - name: Convert to Markdown
        if: steps.precheck.outputs.skip_today != 'true' && steps.dedup_check.outputs.has_new_content == 'true'
        env:
          LANGUAGE: ${{ vars.LANGUAGE }}
        run: |
          source .venv/bin/activate
          today="${{ steps.precheck.outputs.today }}"
          echo "转换为 Markdown 格式..."

          cd to_md
          AI_FILE="../data/${today}_AI_enhanced_${LANGUAGE}.jsonl"

          if [ -f "$AI_FILE" ]; then
              echo "使用 AI 增强文件进行转换..."
              python convert.py --data "$AI_FILE"
          else
              echo "错误：未找到 AI 增强文件"
              echo "AI 文件: $AI_FILE"
              exit 1
          fi

          echo "Markdown 转换完成"

      - name: Update file list
        if: steps.precheck.outputs.skip_today != 'true' && steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          echo "更新文件列表..."
          ls data/*.jsonl | sed 's|data/||' > assets/file-list.txt
          echo "文件列表更新完成"

      - name: Update today interest
        if: steps.precheck.outputs.skip_today != 'true' && steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          echo "更新今日 INTEREST..."
          printf '%s\n' "${{ vars.INTEREST }}" > assets/today-interest.txt
          echo "今日 INTEREST 更新完成"

      - name: Generate password hash and inject into config
        if: steps.precheck.outputs.skip_today != 'true' && steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          echo "🔐 Generating password hash for authentication..."

          PASSWORD="${{ secrets.ACCESS_PASSWORD }}"

          if [ -z "$PASSWORD" ]; then
            echo "⚠️ WARNING: ACCESS_PASSWORD not set in Secrets"
            PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
          else
            PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
            echo "✅ Password hash generated successfully"
          fi

          if [ -f "js/auth-config.js" ]; then
            sed -i "s/PLACEHOLDER_PASSWORD_HASH/$PASSWORD_HASH/" js/auth-config.js
            echo "✅ Password hash injected into js/auth-config.js"
          else
            echo "❌ ERROR: js/auth-config.js not found!"
            exit 1
          fi

          echo "🔐 Authentication setup complete"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.precheck.outputs.skip_today }}" = "true" ]; then
            echo "⏭️ 工作流跳过：今天的 AI 增强文件已存在"
          elif [ "${{ steps.dedup_check.outputs.has_new_content }}" = "true" ]; then
            echo "✅ 工作流完成：发现新内容并成功处理"
          else
            case "${{ steps.dedup_check.outputs.skip_reason }}" in
              "no_new_content")
                echo "ℹ️ 工作流完成：去重后无新内容"
                ;;
              "processing_error")
                echo "⚠️ 工作流完成：去重处理出错"
                ;;
              "unknown_error")
                echo "⚠️ 工作流完成：未知错误"
                ;;
              *)
                echo "ℹ️ 工作流完成：未知原因跳过处理"
                ;;
            esac
          fi

      - name: Commit changes
        if: steps.precheck.outputs.skip_today != 'true' && steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          git config --global user.email "${{ vars.EMAIL }}"
          git config --global user.name "${{ vars.NAME }}"
          git add .

          if git diff --staged --quiet; then
            echo "没有变更需要提交"
            exit 0
          fi

          git commit -m "update: $(date -u '+%Y-%m-%d') arXiv papers"
          echo "变更已提交"

      - name: Pull latest changes and push
        if: steps.precheck.outputs.skip_today != 'true' && steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          git config pull.rebase true
          git config rebase.autoStash true

          for i in {1..3}; do
            echo "推送尝试 $i"
            if git push origin main; then
              echo "推送成功"
              break
            else
              echo "推送失败，拉取最新变更..."
              git pull origin main --no-edit || true
              if [ $i -eq 3 ]; then
                echo "3 次尝试后推送失败"
                exit 1
              fi
            fi
          done

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          CRAWL_DATE: ${{ steps.precheck.outputs.today }}
          INTEREST_KEYWORDS: ${{ vars.INTEREST }}
          SITE_URL: https://cuiliyuan121.github.io/daily-arXiv-ai-enhanced/
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "ℹ️ FEISHU_WEBHOOK_URL is not set, skip Feishu notification"
            exit 0
          fi

          if [ "${{ steps.precheck.outputs.skip_today }}" = "true" ]; then
            MESSAGE="ArXiv skipped: 今日 AI 增强结果已存在，日期: ${CRAWL_DATE} 链接: ${SITE_URL}"
          elif [ "${{ steps.dedup_check.outputs.has_new_content }}" = "true" ]; then
            MESSAGE="ArXiv has updated: 日期: ${CRAWL_DATE} 关键词: ${INTEREST_KEYWORDS} 链接: ${SITE_URL}"
          else
            MESSAGE="ArXiv checked: 日期: ${CRAWL_DATE} 关键词: ${INTEREST_KEYWORDS}，但无新增内容，链接: ${SITE_URL}"
          fi

          if [ -n "$FEISHU_BOT_SECRET" ]; then
            TIMESTAMP=$(date +%s)
            SIGN=$(TIMESTAMP="$TIMESTAMP" FEISHU_BOT_SECRET="$FEISHU_BOT_SECRET" python -c 'import base64, hashlib, hmac, os; timestamp = os.environ["TIMESTAMP"]; secret = os.environ["FEISHU_BOT_SECRET"]; string_to_sign = f"{timestamp}\n{secret}".encode("utf-8"); print(base64.b64encode(hmac.new(string_to_sign, digestmod=hashlib.sha256).digest()).decode("utf-8"))')
            PAYLOAD=$(TIMESTAMP="$TIMESTAMP" SIGN="$SIGN" MESSAGE="$MESSAGE" python -c 'import json, os; print(json.dumps({"timestamp": os.environ["TIMESTAMP"], "sign": os.environ["SIGN"].strip(), "msg_type": "text", "content": {"text": os.environ["MESSAGE"]}}, ensure_ascii=False))')
          else
            PAYLOAD=$(MESSAGE="$MESSAGE" python -c 'import json, os; print(json.dumps({"msg_type": "text", "content": {"text": os.environ["MESSAGE"]}}, ensure_ascii=False))')
          fi

          curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"